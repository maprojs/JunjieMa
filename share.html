<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>浏览器原生分享测试</title>

  <meta
    name="description"
    content="这是一个用于测试浏览器 Web Share API 原生分享功能的页面。"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 32px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    .description {
      margin: 0 0 24px;
      color: #6b7280;
      line-height: 1.8;
    }

    .info {
      margin-bottom: 24px;
      padding: 16px;
      border-radius: 10px;
      background: #f9fafb;
      word-break: break-all;
    }

    .info-item + .info-item {
      margin-top: 12px;
    }

    .info-label {
      display: block;
      margin-bottom: 4px;
      color: #6b7280;
      font-size: 13px;
    }

    button {
      width: 100%;
      min-height: 48px;
      padding: 12px 18px;
      border: 0;
      border-radius: 9px;
      color: #fff;
      background: #2563eb;
      font-size: 16px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .status {
      min-height: 24px;
      margin-top: 20px;
      line-height: 1.6;
    }

    .success {
      color: #15803d;
    }

    .warning {
      color: #b45309;
    }

    .error {
      color: #b91c1c;
    }

    .support {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
      line-height: 1.8;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>浏览器原生分享测试</h1>

    <p class="description">
      本地文件打开时只分享文字；部署到网站后同时分享网页链接。
    </p>

    <section class="info">
      <div class="info-item">
        <span class="info-label">当前页面协议</span>
        <span id="protocol"></span>
      </div>

      <div class="info-item">
        <span class="info-label">当前页面地址</span>
        <span id="pageUrl"></span>
      </div>

      <div class="info-item">
        <span class="info-label">实际分享内容</span>
        <span id="shareMode"></span>
      </div>
    </section>

    <button id="shareButton" type="button">
      调用原生分享
    </button>

    <div
      id="status"
      class="status"
      role="status"
      aria-live="polite"
    ></div>

    <div class="support" id="supportResult"></div>
  </main>

  <script>
    const shareButton =
      document.getElementById("shareButton");

    const statusElement =
      document.getElementById("status");

    const supportResult =
      document.getElementById("supportResult");

    const description =
      document.querySelector(
        'meta[name="description"]'
      )?.content || "分享这个页面";

    const isWebPage =
      location.protocol === "https:" ||
      location.protocol === "http:";

    document.getElementById("protocol").textContent =
      location.protocol;

    document.getElementById("pageUrl").textContent =
      location.href;

    document.getElementById("shareMode").textContent =
      isWebPage
        ? "标题、描述和网页链接"
        : "标题和描述，不包含本地文件地址";

    function showStatus(message, type = "") {
      statusElement.textContent = message;
      statusElement.className = `status ${type}`;
    }

    function getShareData() {
      const data = {
        title: document.title,
        text: description
      };

      // file:// 和 edge://external-file 不传入 url
      if (isWebPage) {
        data.url = location.href;
      }

      return data;
    }

    shareButton.addEventListener("click", async () => {
      showStatus("");

      if (!navigator.share) {
        showStatus(
          "当前浏览器不支持 Web Share API。",
          "warning"
        );
        return;
      }

      const shareData = getShareData();

      try {
        if (
          navigator.canShare &&
          !navigator.canShare(shareData)
        ) {
          showStatus(
            "当前浏览器不接受这些分享内容。",
            "error"
          );
          return;
        }

        await navigator.share(shareData);

        showStatus(
          "分享面板已成功调用。",
          "success"
        );
      } catch (error) {
        if (error.name === "AbortError") {
          showStatus("已取消分享。", "warning");
          return;
        }

        console.error("分享错误：", error);

        showStatus(
          `分享失败：${error.name}；` +
          `${error.message || "未知错误"}`,
          "error"
        );
      }
    });

    supportResult.textContent = navigator.share
      ? "检测结果：当前浏览器支持 Web Share API。"
      : "检测结果：当前浏览器不支持 Web Share API。";
  </script>
</body>
</html>
